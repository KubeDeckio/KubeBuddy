      app: test-privileged
  template:
    metadata:
      labels:
        app: test-privileged
    spec:
      containers:
        - name: app
          image: nginx:1.25.5
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 256Mi
          readinessProbe:
