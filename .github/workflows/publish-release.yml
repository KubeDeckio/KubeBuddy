name: Publish KubeBuddy Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.0.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          if [ -z "$TAG" ]; then
            echo "Unable to resolve release tag." >&2
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tag must start with 'v'. Got: $TAG" >&2
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          chmod +x ./scripts/build-release-artifacts.sh
          chmod +x ./scripts/render-homebrew-formula.sh
          ./scripts/build-release-artifacts.sh "${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  check-latest:
    needs: build-and-release
    if: needs.build-and-release.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.release == needs.build-and-release.outputs.tag }}
    steps:
      - id: check
        uses: pozetroninc/github-action-get-latest-release@2a61c339ea7ef0a336d1daa35ef0cb1418e7676c # v0.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          excludes: prerelease, draft

  update-formula:
    needs: [build-and-release, check-latest]
    runs-on: ubuntu-latest
    if: needs.build-and-release.result == 'success' && needs.check-latest.outputs.is_latest == 'true'
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        env:
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          chmod +x ./scripts/build-release-artifacts.sh
          chmod +x ./scripts/render-homebrew-formula.sh
          ./scripts/build-release-artifacts.sh "${TAG}"

      - name: Checkout homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: KubeDeckio/homebrew-kubebuddy
          token: ${{ secrets.BREW_BUMP_TOKEN }}
          path: homebrew-kubebuddy

      - name: Update formula
        env:
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          ./scripts/render-homebrew-formula.sh "${TAG}" homebrew-kubebuddy/Formula/kubebuddy.rb

          cat > homebrew-kubebuddy/README.md <<'EOF'
          # Homebrew Tap for KubeBuddy

          This repository provides the Homebrew tap for the native KubeBuddy CLI.

          ## Installation

          ```bash
          brew tap KubeDeckio/homebrew-kubebuddy
          brew install kubebuddy
          ```

          ## Usage

          ```bash
          kubebuddy version
          kubebuddy run --html-report --yes --output-path ./reports
          ```
          EOF

          cd homebrew-kubebuddy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/kubebuddy.rb README.md
          git commit -m "Bump KubeBuddy formula to ${TAG}"
          git push
