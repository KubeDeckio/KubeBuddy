  speech_bubble:
  - "\U0001F916 Some containers are still missing resource requests."
  - "\u26A0\uFE0F Without requests the scheduler can\u2019t make good placement decisions."
  - "\U0001F4A1 Set both CPU and memory requests explicitly so admission and scheduling behave predictably."
- id: WRK006
