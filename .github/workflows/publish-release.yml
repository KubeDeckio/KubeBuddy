name: Publish KubeBuddy Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.0.4
        required: true
        type: string
      headlamp_plugin_version:
        description: Optional Headlamp plugin version to publish, for example 0.1.0. Defaults to headlamp-plugin/package.json.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          if [ -z "$TAG" ]; then
            echo "Unable to resolve release tag." >&2
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tag must start with 'v'. Got: $TAG" >&2
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: headlamp-plugin/package-lock.json

      - name: Prepare Headlamp plugin metadata
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          HEADLAMP_PLUGIN_VERSION: ${{ github.event.inputs.headlamp_plugin_version }}
        run: |
          args=("${TAG}")
          if [ -n "${HEADLAMP_PLUGIN_VERSION}" ]; then
            args+=("--plugin-version=${HEADLAMP_PLUGIN_VERSION}")
          fi
          node scripts/prepare-headlamp-plugin-release.mjs "${args[@]}"

      - name: Install Headlamp plugin dependencies
        working-directory: headlamp-plugin
        run: npm ci

      - name: Lint Headlamp plugin
        working-directory: headlamp-plugin
        run: npm run lint

      - name: Typecheck Headlamp plugin
        working-directory: headlamp-plugin
        run: npm run tsc

      - name: Build Headlamp plugin
        working-directory: headlamp-plugin
        run: npm run build

      - name: Package Headlamp plugin
        working-directory: headlamp-plugin
        run: npm run package

      - name: Update Headlamp plugin Artifact Hub checksum
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          plugin_version="$(node -p "require('./headlamp-plugin/package.json').version")"
          tarball="headlamp-plugin/kubebuddy-headlamp-plugin-${plugin_version}.tar.gz"
          checksum="$(sha256sum "$tarball" | awk '{print $1}')"
          node scripts/prepare-headlamp-plugin-release.mjs "${TAG}" "--plugin-version=${plugin_version}" "--checksum=${checksum}"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          chmod +x ./scripts/build-release-artifacts.sh
          chmod +x ./scripts/render-homebrew-formula.sh
          ./scripts/build-release-artifacts.sh "${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            headlamp-plugin/kubebuddy-headlamp-plugin-*.tar.gz
          generate_release_notes: true

      - name: Push Headlamp plugin release metadata to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tmp_dir="$(mktemp -d)"
          cp headlamp-plugin/package.json "$tmp_dir/package.json"
          cp headlamp-plugin/package-lock.json "$tmp_dir/package-lock.json"
          cp headlamp-plugin/artifacthub-pkg.yml "$tmp_dir/artifacthub-pkg.yml"
          cp headlamp-plugin/README.md "$tmp_dir/README.md"

          git fetch origin main
          git switch -C release-headlamp-plugin-metadata origin/main

          cp "$tmp_dir/package.json" headlamp-plugin/package.json
          cp "$tmp_dir/package-lock.json" headlamp-plugin/package-lock.json
          cp "$tmp_dir/artifacthub-pkg.yml" headlamp-plugin/artifacthub-pkg.yml
          cp "$tmp_dir/README.md" headlamp-plugin/README.md

          git add headlamp-plugin/package.json \
            headlamp-plugin/package-lock.json \
            headlamp-plugin/artifacthub-pkg.yml \
            headlamp-plugin/README.md

          if git diff --cached --quiet; then
            echo "No Headlamp plugin release metadata changes to commit"
          else
            git commit -m "plugin: Prepare Headlamp metadata for ${{ steps.meta.outputs.tag }}"
            git push origin HEAD:main
          fi

  check-latest:
    needs: build-and-release
    if: needs.build-and-release.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.release == needs.build-and-release.outputs.tag }}
    steps:
      - id: check
        uses: pozetroninc/github-action-get-latest-release@2a61c339ea7ef0a336d1daa35ef0cb1418e7676c # v0.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          excludes: prerelease, draft

  update-formula:
    needs: [build-and-release, check-latest]
    runs-on: ubuntu-latest
    if: needs.build-and-release.result == 'success' && needs.check-latest.outputs.is_latest == 'true'
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        env:
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          chmod +x ./scripts/build-release-artifacts.sh
          chmod +x ./scripts/render-homebrew-formula.sh
          ./scripts/build-release-artifacts.sh "${TAG}"

      - name: Checkout homebrew tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: KubeDeckio/homebrew-kubebuddy
          token: ${{ secrets.BREW_BUMP_TOKEN }}
          path: homebrew-kubebuddy

      - name: Update formula
        env:
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          ./scripts/render-homebrew-formula.sh "${TAG}" homebrew-kubebuddy/Formula/kubebuddy.rb

          cat > homebrew-kubebuddy/README.md <<'EOF'
          # Homebrew Tap for KubeBuddy

          This repository provides the Homebrew tap for the native KubeBuddy CLI.

          ## Installation

          ```bash
          brew tap KubeDeckio/homebrew-kubebuddy
          brew install kubebuddy
          ```

          ## Usage

          ```bash
          kubebuddy version
          kubebuddy run --html-report --yes --output-path ./reports
          ```
          EOF

          cd homebrew-kubebuddy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/kubebuddy.rb README.md
          git commit -m "Bump KubeBuddy formula to ${TAG}"
          git push
