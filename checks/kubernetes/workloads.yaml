checks:
  - id: POD003
    name: Failed Pods
    section: Pods
    category: Workloads
    resource_kind: Pod
    severity: High
    weight: 4
    description: Detects pods in a failed phase, typically due to startup errors, crashes, or misconfiguration.
    fail_message: Some pods are stuck in the 'Failed' phase. These workloads are not running and require attention.
    recommendation: Investigate failed pods for common issues like image errors, resource constraints, or crash loops.
    recommendation_html: |
      <div class="recommendation-content">
        <ul>
          <li>Check the pod events with <code>kubectl describe pod &lt;pod&gt; -n &lt;ns&gt;</code></li>
          <li>Review logs using <code>kubectl logs &lt;pod&gt; -n &lt;ns&gt;</code></li>
          <li>Validate container specs, resource limits, and init containers</li>
          <li>Check node availability or taints</li>
        </ul>
      </div>
    url: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-phase
    value:
      path: status.phase
    operator: not_equals
    expected: Failed

  - id: POD004
    name: Pending Pods
    section: Pods
    category: Workloads
    resource_kind: Pod
    severity: Warning
    weight: 3
    description: Detects pods stuck in a 'Pending' state due to scheduling or resource issues.
    fail_message: Some pods are stuck in Pending. These workloads are not running and are waiting on cluster conditions.
    recommendation: Inspect scheduling constraints, resource availability, and missing dependencies.
    recommendation_html: |
      <div class="recommendation-content">
        <ul>
          <li>Run <code>kubectl describe pod &lt;pod&gt; -n &lt;namespace&gt;</code> to check scheduling events</li>
          <li>Check if nodes meet the pod's resource requests and tolerations</li>
          <li>Look for unresolved PVCs, Secrets, or ConfigMaps</li>
          <li>Check cluster-wide CPU and memory availability</li>
        </ul>
      </div>
    url: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-phase
    value:
      path: status.phase
    operator: not_equals
    expected: Pending

  - id: POD005
    name: CrashLoopBackOff Pods
    section: Pods
    category: Workloads
    resource_kind: Pod
    severity: High
    weight: 4
    description: Identifies pods stuck in a CrashLoopBackOff state due to repeated container crashes.
    fail_message: Some pods are stuck restarting in CrashLoopBackOff. These workloads are not stable.
    recommendation: Check logs, investigate container errors, and fix misconfigurations.
    recommendation_html: |
      <div class="recommendation-content">
        <ul>
          <li>Run <code>kubectl logs &lt;pod-name&gt; -n &lt;namespace&gt;</code> to see error output</li>
          <li>Describe the pod for events and messages: <code>kubectl describe pod &lt;pod&gt; -n &lt;ns&gt;</code></li>
          <li>Check init containers, config errors, and resource limits</li>
        </ul>
      </div>
    url: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#restart-policy
    value:
      path: status.containerStatuses[].state.waiting.reason
    operator: not_contains
    expected: CrashLoopBackOff

  - id: POD008
    name: Automounting API Credentials Enabled in Pods
    section: Pods
    category: Workloads
    resource_kind: Pod
    severity: Warning
    weight: 2
    description: Flags pods that do not explicitly disable service account token automounting.
    fail_message: Pod automounts API credentials.
    recommendation: Set automountServiceAccountToken to false unless the pod needs Kubernetes API access.
    url: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
    native_handler: POD008
    value:
      path: metadata.name
    operator: exists
