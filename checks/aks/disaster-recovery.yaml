checks:
  - id: AKSDR001
    name: Agent Pools with Availability Zones
    category: Disaster Recovery
    severity: High
    resource_kind: aksCluster
    sources:
      - aks.cluster
    value:
      count_where:
        path: properties.agentPoolProfiles
        where:
          path: availabilityZones
          operator: less_than
          expected: 3
    operator: equals
    expected: 0
    fail_message: Node pools are not distributed across multiple availability zones, creating vulnerability to datacenter-level failures, planned maintenance events, and regional outages. Single-zone deployment provides no protection against infrastructure failures and violates high availability best practices.
    recommendation: Deploy node pools across availability zones using 'az aks nodepool add --availability-zones 1 2 3 --resource-group <rg> --cluster-name <cluster> --name <pool>'. Ensure at least 3 zones are used for production workloads to achieve 99.95% SLA and protect against datacenter failures.
    url: https://learn.microsoft.com/azure/aks/availability-zones

  - id: AKSDR002
    name: Control Plane SLA
    category: Disaster Recovery
    severity: Medium
    resource_kind: aksCluster
    sources:
      - aks.cluster
    automatic_relevance: alignment
    automatic_scope: platform
    automatic_reason: aks_platform
    value:
      path: sku.tier
    operator: equals
    expected: Standard
    fail_message: Cluster is using the Free tier without SLA guarantees, providing no financial commitment for uptime and limited support options. Free tier offers best-effort availability but no compensation for outages, making it unsuitable for production workloads requiring reliability commitments.
    recommendation: Upgrade to Standard tier using 'az aks update --resource-group <rg> --name <cluster> --tier Standard' to get 99.95% uptime SLA, financially-backed availability guarantees, and improved support. This is essential for production workloads requiring high availability.
    url: https://learn.microsoft.com/azure/aks/free-standard-pricing-tiers
