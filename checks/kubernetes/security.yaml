checks:
- id: SEC001
  name: Orphaned Secrets
  category: Security
  section: Security
  resource_kind: Secret
  severity: Warning
  weight: 2
  description: Detects Secrets not used by workloads or related resources.
  fail_message: Secret is unused.
  recommendation: Remove unused Secrets after confirming they are not required.
  url: https://kubernetes.io/docs/concepts/configuration/secret/
  native_handler: SEC001
  value:
    path: metadata.name
  operator: exists
  recommendation_html: "<div class=\"recommendation-content\">\n  <h4>\U0001F510 Orphaned Secrets Cleanup</h4>\n  <ul>\n    <li>Remove Secrets not referenced in Pods, Deployments, StatefulSets, or Ingresses.</li>\n    <li>Audit Secret content before deletion to avoid removing active credentials.</li>\n    <li>Validate Custom Resources don\u2019t indirectly depend on these Secrets.</li>\n    <li>Regularly prune Secrets as part of security hygiene.</li>\n  </ul>\n</div>"
  speech_bubble:
  - "\U0001F916 Secrets store sensitive data such as API keys and credentials."
  - "\U0001F4CC This check identifies Secrets that are NOT used by:"
  - '- Pods, Deployments, StatefulSets, DaemonSets.'
  - '- Ingress TLS, ServiceAccounts, and Custom Resources.'
  - "\u26A0\uFE0F Unused Secrets may indicate outdated credentials or misconfigurations."
  - "\u26A0\uFE0F Total Orphaned Secrets Found: $total"
- id: SEC002
  name: Pods using hostPID or hostNetwork
  category: Pods
  section: Security
  resource_kind: Pod
  severity: High
  weight: 4
  description: Flags pods that share the host PID or network namespace, which can compromise isolation and node security.
  fail_message: Pod uses hostPID or hostNetwork
  recommendation: Avoid using hostPID or hostNetwork unless strictly required. These settings reduce isolation and can expose the host.
  recommendation_html: "<div class=\"recommendation-content\">\n  <h4>Avoid Host-Level Sharing</h4>\n  <ul>\n    <li>Set <code>hostPID: false</code> and <code>hostNetwork: false</code> unless needed for special workloads.</li>\n    <li>Review security implications of namespace sharing with the host.</li>\n    <li>Restrict use of these settings to trusted namespaces and workloads.</li>\n    <li>Consider using PSPs or OPA/Gatekeeper policies to prevent usage cluster-wide.</li>\n  </ul>\n</div>\n"
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#baseline
  native_handler: SEC002
  value:
    path: spec.hostNetwork
  operator: not_equals
  expected: true
  speech_bubble:
  - "\U0001F916 Some pods use host-level process or network namespaces."
  - "\U0001F4CC This check identifies pods with:"
  - '- hostPID = true'
  - '- hostNetwork = true'
  - "\u26A0\uFE0F These settings can bypass isolation and expose the node."
  - "\u26A0\uFE0F Total Flagged Pods: $($flaggedPods.Count)"
- id: SEC004
  name: Privileged Containers
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 5
  description: Detects containers running with privileged mode enabled.
  fail_message: Privileged container found
  recommendation: Avoid using privileged containers unless absolutely necessary, as they grant broad access to host resources.
  recommendation_html: "<div class=\"recommendation-content\">\n  <h4>Disable Privileged Containers</h4>\n  <ul>\n    <li>Remove <code>securityContext.privileged: true</code> from container specs.</li>\n    <li>Refactor workloads to avoid needing host-level access.</li>\n    <li>Enforce restrictions using Pod Security Policies or OPA/Gatekeeper.</li>\n    <li>Limit use to dedicated namespaces with strict controls.</li>\n  </ul>\n</div>\n"
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
  native_handler: SEC004
  value:
    path: spec.containers[].securityContext.privileged
  operator: not_equals
  expected: true
  speech_bubble:
  - "\U0001F916 One or more containers are running with <code>privileged: true</code>."
  - "\U0001F4CC This bypasses container isolation and exposes the host."
  - "\u26A0\uFE0F Only use privileged mode when absolutely necessary."
- id: SEC003
  name: Pods Running as Root
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 5
  description: Detects pods running with UID 0 or no explicit runAsUser setting, which defaults to root in many images.
  fail_message: Pod runs as root user or has no runAsUser set
  recommendation: Avoid running pods as root by explicitly setting runAsUser to a non-zero UID in pod or container securityContext.
  recommendation_html: "<div class=\"recommendation-content\">\n  <h4>RunAsUser Hardening</h4>\n  <ul>\n    <li>Set <code>runAsUser</code> to a non-zero UID at pod or container level.</li>\n    <li>Avoid relying on container defaults and define securityContext explicitly.</li>\n    <li>Validate any custom base images that may default to root.</li>\n  </ul>\n</div>\n"
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#baseline
  native_handler: SEC003
  value:
    path: spec.securityContext.runAsUser
  operator: equals
  expected: 0
  speech_bubble:
  - "\U0001F916 Some pods are running as root (UID 0) or without explicit user settings."
  - "\U0001F4CC This check looks for:"
  - '- container or pod runAsUser = 0'
  - '- runAsUser not set (defaults to root)'
  - "\u26A0\uFE0F Running as root bypasses container security boundaries."
  - Review and correct these containers.
- id: SEC010
  name: HostPath Volume Usage
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 3
  description: Flags pods that use hostPath volumes, which mount parts of the host filesystem and bypass isolation.
  fail_message: HostPath volume present in pod
  recommendation: Avoid using hostPath unless absolutely necessary. Use persistent volumes instead.
  recommendation_html: "<ul>\n  <li>Remove hostPath volumes unless needed for host-level access.</li>\n  <li>Consider alternatives like persistent volume claims or configMaps.</li>\n</ul>\n"
  url: https://kubernetes.io/docs/concepts/storage/volumes/#hostpath
  native_handler: SEC010
  value:
    path: spec.volumes[].hostPath.path
  operator: equals
  expected: null
  speech_bubble:
  - Avoid using hostPath unless absolutely necessary.
  - Use persistent volumes instead.
- id: SEC006
  name: Pods Missing Secure Defaults
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: Warning
  weight: 3
  description: Checks if pods are missing recommended securityContext fields such as runAsNonRoot, readOnlyRootFilesystem, or allowPrivilegeEscalation.
  fail_message: One or more pods are missing recommended security settings.
  recommendation: Set runAsNonRoot=true, readOnlyRootFilesystem=true, and allowPrivilegeEscalation=false for all pods and containers.
  recommendation_html: "<ul>\n  <li>Set <code>securityContext.runAsNonRoot: true</code></li>\n  <li>Set <code>securityContext.readOnlyRootFilesystem: true</code></li>\n  <li>Set <code>securityContext.allowPrivilegeEscalation: false</code></li>\n</ul>\n"
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
  native_handler: SEC006
  value:
    path: spec.containers[].securityContext
  operator: equals
  expected: null
  speech_bubble:
  - Some pods are missing secure defaults like runAsNonRoot or readOnlyRootFilesystem.
  - Lock down your pod security context to reduce attack surface.
- id: SEC012
  name: Added Linux Capabilities
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: Warning
  weight: 2
  description: Flags containers that add extra Linux capabilities using securityContext.capabilities.add.
  fail_message: Linux capabilities added
  recommendation: Avoid adding capabilities unless necessary. Most apps do not need them.
  recommendation_html: "<ul>\n  <li>Review and remove unnecessary capabilities.</li>\n  <li>Default to dropping all, then selectively add only what is needed.</li>\n</ul>\n"
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
  native_handler: SEC012
  value:
    path: spec.containers[].securityContext.capabilities.add
  operator: equals
  expected: null
  speech_bubble:
  - Avoid adding capabilities unless necessary.
  - Most apps do not need them.
- id: SEC019
  name: Unsupported AppArmor Values
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 2
  description: Detects AppArmor annotations or profile types that are not permitted by baseline Pod Security Standards.
  fail_message: Pod specifies unsupported AppArmor values
  recommendation: Use RuntimeDefault or Localhost AppArmor profiles, or remove custom unsupported AppArmor values.
  recommendation_html: "<ul>\n  <li>Allowed values are <code>runtime/default</code> or <code>localhost/*</code> in annotations, and <code>RuntimeDefault</code> or <code>Localhost</code> for structured profiles.</li>\n  <li>Remove legacy or custom profile names that AKS Automatic baseline policy would reject.</li>\n</ul>\n"
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#baseline
  native_handler: SEC019
  value:
    path: metadata.annotations
  operator: equals
  expected: null
  speech_bubble:
  - Use RuntimeDefault or Localhost AppArmor profiles, or remove custom unsupported AppArmor values.
- id: SEC020
  name: Seccomp Profile Not Configured
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: Warning
  weight: 2
  description: Detects pods and containers that do not explicitly configure a seccomp profile.
  fail_message: Seccomp profile is not configured.
  recommendation: Set seccompProfile.type to RuntimeDefault or Localhost at the pod or container level.
  recommendation_html: "<div class=\"recommendation-content\">\n  <ul>\n    <li>Set <code>securityContext.seccompProfile.type: RuntimeDefault</code> for the pod or each container.</li>\n    <li>If you need a custom profile, use <code>Localhost</code> and ensure the profile exists on the node.</li>\n    <li>Doing this avoids AKS Automatic seccomp warnings and makes the security posture explicit.</li>\n  </ul>\n</div>\n"
  url: https://kubernetes.io/docs/concepts/security/linux-kernel-security-constraints/#seccomp
  native_handler: SEC020
  value:
    path: spec.securityContext.seccompProfile.type
  operator: equals
  expected: null
  speech_bubble:
  - Set seccompProfile.type to RuntimeDefault or Localhost at the pod or container level.
- id: SEC009
  name: Missing Capabilities Drop
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: Warning
  weight: 3
  description: Checks containers that do not drop all Linux capabilities via securityContext.capabilities.drop = ['ALL'].
  fail_message: Container does not drop all capabilities
  recommendation: Explicitly drop all Linux capabilities unless specific ones are needed.
  recommendation_html: "<ul>\n  <li>Set <code>securityContext.capabilities.drop: ['ALL']</code> in container specs.</li>\n  <li>Allow only required capabilities via <code>add</code> list, if any.</li>\n</ul>\n"
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
  native_handler: SEC009
  value:
    path: spec.containers[].securityContext.capabilities.drop
  operator: equals
  expected: ALL
  speech_bubble:
  - Containers should drop unused Linux capabilities by default.
  - This helps minimize potential kernel-level exploits.
- id: SEC005
  name: Pods Using hostIPC
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 3
  description: Detects pods that enable hostIPC.
  fail_message: hostIPC is enabled.
  recommendation: Disable hostIPC unless a workload absolutely requires it.
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
  native_handler: SEC005
  value:
    path: spec.hostIPC
  operator: exists
  recommendation_html: "<div class=\"recommendation-content\">\n  <h4>\U0001F512 Disable hostIPC for Pods</h4>\n  <ul>\n    <li>Remove <code>hostIPC: true</code> from pod specs.</li>\n    <li>Review workloads that require inter-process communication with the host.</li>\n    <li>Use shared memory only through secure, scoped means.</li>\n  </ul>\n</div>"
  speech_bubble:
  - "\U0001F916 hostIPC allows containers to share memory with the host."
  - "\U0001F4CC This check identifies pods with <code>hostIPC: true</code>."
  - "\u26A0\uFE0F Sharing IPC with the host can leak data and break isolation."
- id: SEC007
  name: Missing Pod Security Admission Labels
  category: Pod Security
  section: Security
  resource_kind: Namespace
  severity: Low
  weight: 2
  description: Flags namespaces missing pod security admission enforce labels.
  fail_message: Namespace is missing pod security admission labels.
  recommendation: Set enforce, warn, and audit Pod Security labels on namespaces.
  url: https://kubernetes.io/docs/concepts/security/pod-security-admission/
  native_handler: SEC007
  value:
    path: metadata.name
  operator: exists
  recommendation_html: "<ul>\n  <li>Set <code>pod-security.kubernetes.io/enforce=restricted</code> on sensitive namespaces.</li>\n  <li>Optionally use <code>enforce-version</code> and <code>audit</code> labels.</li>\n</ul>"
  speech_bubble:
  - Some namespaces are missing Pod Security labels.
  - Without them, Kubernetes won't enforce Pod Security Admission policies.
- id: SEC008
  name: Secrets in Environment Variables
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 2
  description: Detects secrets exposed through environment variables.
  fail_message: Secret is exposed through an environment variable.
  recommendation: Prefer mounted files or external secret providers over env vars where possible.
  url: https://kubernetes.io/docs/concepts/configuration/secret/
  native_handler: SEC008
  value:
    path: spec.containers
  operator: exists
  recommendation_html: "<ul>\n  <li>Use secret volumes instead of env vars to reduce accidental exposure.</li>\n  <li>Avoid using <code>valueFrom.secretKeyRef</code> in <code>env</code>.</li>\n  <li>Limit permissions to read secrets.</li>\n</ul>"
  speech_bubble:
  - Some pods expose secrets via environment variables.
  - This is less secure than using volume mounts.
- id: SEC011
  name: Containers Running as UID 0
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 3
  description: Flags containers explicitly configured to run as UID 0.
  fail_message: Container runs as UID 0.
  recommendation: Set runAsUser to a non-zero UID.
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
  native_handler: SEC011
  value:
    path: spec.containers
  operator: exists
  recommendation_html: "<ul>\n  <li>Set runAsUser to a non-root user ID.</li>\n  <li>Use runAsNonRoot: true for validation.</li>\n</ul>"
  speech_bubble:
  - Set runAsUser to a non-zero UID.
- id: SEC014
  name: Untrusted Image Registries
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 2
  description: Flags images that do not come from trusted registries.
  fail_message: Image comes from an untrusted registry.
  recommendation: Restrict deployments to approved image registries.
  url: https://kubernetes.io/docs/concepts/containers/images/
  native_handler: SEC014
  value:
    path: spec.containers
  operator: exists
  recommendation_html: "<ul>\n  <li>Use approved internal or vendor-verified registries.</li>\n  <li>Restrict image pull policies using Gatekeeper or admission plugins.</li>\n</ul>"
  speech_bubble:
  - Restrict deployments to approved image registries.
- id: SEC016
  name: Unconfined Seccomp Profiles
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 3
  description: Detects pods or containers explicitly using the Unconfined seccomp profile.
  fail_message: Unconfined seccomp profile detected.
  recommendation: Use RuntimeDefault or a vetted Localhost profile instead.
  url: https://kubernetes.io/docs/concepts/security/linux-kernel-security-constraints/#seccomp
  native_handler: SEC016
  value:
    path: metadata.name
  operator: exists
  recommendation_html: "<ul>\n  <li>Check envFrom, secretKeyRef, and volume.secret.secretName references.</li>\n  <li>Create missing Secrets or remove invalid references.</li>\n</ul>"
  speech_bubble:
  - Use RuntimeDefault or a vetted Localhost profile instead.
- id: SEC017
  name: Non-Default ProcMount
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: High
  weight: 2
  description: Flags containers that set procMount to a non-default value.
  fail_message: Container uses a non-default procMount.
  recommendation: Keep procMount at Default unless there is a tightly controlled justification.
  url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
  native_handler: SEC017
  value:
    path: metadata.name
  operator: exists
  recommendation_html: "<ul>\n  <li>Set <code>securityContext.procMount: Default</code> or omit the field.</li>\n  <li>Review debugging and observability agents that rely on custom proc mounts.</li>\n</ul>"
  speech_bubble:
  - Keep procMount at Default unless there is a tightly controlled justification.
- id: SEC013
  name: EmptyDir Volume Usage
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: Low
  weight: 1
  description: EmptyDir volumes are ephemeral and cleared on pod restart. Use only if data persistence is not needed.
  fail_message: EmptyDir used
  recommendation: Use persistent volumes or configMaps instead of EmptyDir when persistence is required.
  recommendation_html: "<ul>\n  <li>Audit use of EmptyDir volumes in production workloads.</li>\n  <li>Replace with PVCs or other managed storage if persistence is needed.</li>\n</ul>\n"
  url: https://kubernetes.io/docs/concepts/storage/volumes/#emptydir
  native_handler: SEC013
  value:
    path: spec.volumes[].emptyDir
  operator: equals
  expected: null
  speech_bubble:
  - Use persistent volumes or configMaps instead of EmptyDir when persistence is required.
- id: SEC015
  name: Pods Using Default ServiceAccount
  category: Pod Security
  section: Security
  resource_kind: Pod
  severity: Critical
  weight: 3
  description: Flags pods using the default service account, which may have broad permissions.
  fail_message: Pod uses default ServiceAccount
  recommendation: Assign a dedicated ServiceAccount to each workload with least-privilege permissions.
  recommendation_html: "<ul>\n  <li>Create and bind a custom ServiceAccount per application.</li>\n  <li>Avoid using the <code>default</code> ServiceAccount unless absolutely necessary.</li>\n</ul>\n"
  url: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  value:
    path: spec.serviceAccountName
  operator: not_equals
  expected: default
  speech_bubble:
  - Assign a dedicated ServiceAccount to each workload with least-privilege permissions.
- id: SEC018
  name: Automounting API Credentials Enabled in ServiceAccounts
  category: Security
  section: Security
  resource_kind: ServiceAccount
  severity: Critical
  weight: 3
  description: Flags ServiceAccounts where automounting of API credentials is enabled, affecting associated Pods.
  fail_message: Some ServiceAccounts have automountServiceAccountToken enabled, potentially exposing API credentials to Pods.
  recommendation: Set automountServiceAccountToken to false in ServiceAccount specs unless Pods require API access.
  recommendation_html: "<div class=\"recommendation-content\">\n  <h4>Disable Automounting in ServiceAccounts</h4>\n  <ul>\n    <li>Add <code>automountServiceAccountToken: false</code> to the ServiceAccount spec.</li>\n    <li>Edit with <code>kubectl edit serviceaccount &lt;sa-name&gt; -n &lt;namespace&gt;</code>.</li>\n    <li>Ensure Pods needing API access override this in their spec with <code>automountServiceAccountToken: true</code>.</li>\n    <li>Use RBAC to limit ServiceAccount permissions if access is required.</li>\n  </ul>\n</div>\n"
  url: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  value:
    path: automountServiceAccountToken
  operator: not_equals
  expected: true
  speech_bubble:
  - "\U0001F916 Some ServiceAccounts enable API credential automounting."
  - "\U0001F4CC This affects all Pods using these ServiceAccounts."
  - "\u26A0\uFE0F Disable unless required for specific workloads."
