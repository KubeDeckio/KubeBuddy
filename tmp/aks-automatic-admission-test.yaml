apiVersion: v1
kind: Namespace
metadata:
  name: aks-automatic-admission-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-root-user
  namespace: aks-automatic-admission-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-root-user
  template:
    metadata:
      labels:
        app: test-root-user
    spec:
      containers:
        - name: app
          image: nginx:1.25.5
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-privileged
  namespace: aks-automatic-admission-test
spec:
  replicas: 1
