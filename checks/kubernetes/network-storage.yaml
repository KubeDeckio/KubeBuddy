- id: SC004
  name: StorageClass Prevents Volume Expansion
  category: StorageClasses
  section: Storage
  resource_kind: StorageClass
  severity: Medium
  weight: 2
  description: Identifies StorageClasses that do not permit volume expansion, which can limit dynamic scaling of stateful applications.
  fail_message: StorageClass does not allow volume expansion.
  recommendation: "If dynamic volume resizing is desired, modify the StorageClass to set allowVolumeExpansion: true. Note: some underlying storage systems may not support this feature."
  url: https://kubernetes.io/docs/concepts/storage/storage-classes/#allow-volume-expansion
  value:
    path: allowVolumeExpansion
  operator: not_equals
  expected: true
  recommendation_html: "<div class=\"recommendation-content\">\n  <h4>\U0001F4C8 Enable Volume Expansion</h4>\n  <ul>\n    <li><strong>Assess:</strong> Determine if your applications need dynamic volume resizing.</li>\n    <li><strong>Configure:</strong> Add or set <code>allowVolumeExpansion: true</code> in the StorageClass definition.</li>\n    <li><strong>Backend Check:</strong> Ensure your storage backend supports online volume expansion.</li>\n  </ul>\n</div>"
  speech_bubble:
  - Need more storage? Sometimes volumes can grow.
  - But your StorageClass might prevent it.
  - Check allowVolumeExpansion.
  - This keeps dynamic resizing possible.
