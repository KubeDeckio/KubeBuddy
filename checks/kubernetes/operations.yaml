- id: WRK015
  name: Replicated Workloads Missing Spread Constraints
  category: Workloads
  section: Workloads
  resource_kind: Deployment
  severity: Warning
  weight: 2
  automatic_relevance: blocker
  automatic_scope: workload
  automatic_reason: pod_spread
  automatic_admission_behavior: denies_on_enforce
  automatic_mutation_outcome: "Observed on AKS Automatic: replicated workloads without pod anti-affinity or topology spread constraints can be denied at admission."
  description: Detects replicated workloads that define neither anti-affinity nor topology spread constraints.
  fail_message: Replicated workload lacks spread constraints.
  recommendation: "Add pod anti-affinity or topology spread constraints to replicated workloads."
  url: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
  native_handler: WRK015
  value:
    path: metadata.name
  operator: exists
  recommendation_html: "<div class=\"recommendation-content\">\n  <ul>\n    <li>Add <code>topologySpreadConstraints</code> or <code>affinity.podAntiAffinity</code> to each workload with multiple replicas.</li>\n    <li>Prefer distribution across nodes and zones using stable labels such as <code>topology.kubernetes.io/zone</code> and <code>kubernetes.io/hostname</code>.</li>\n    <li>Update the source Deployment, StatefulSet, or Helm values so the spreading rule is maintained on future releases.</li>\n  </ul>\n</div>"
  speech_bubble:
  - "\U0001F916 Some replicated workloads do not declare any pod spreading rules."
  - "\U0001F4CC AKS Automatic can reject those workloads to avoid single-node placement."
  - "\u26A0\uFE0F Add topology spread or pod anti-affinity at the source manifest."
- id: WRK010
