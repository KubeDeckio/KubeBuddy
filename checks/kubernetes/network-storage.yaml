  recommendation_html: "<div class=\"recommendation-content\">\n  <h4>\U0001F504 Migrate Azure StorageClasses to CSI</h4>\n  <ul>\n    <li>Create replacement StorageClasses that use <code>disk.csi.azure.com</code> or <code>file.csi.azure.com</code>.</li>\n    <li>Move PVCs and workloads off the in-tree StorageClass before migrating to AKS Automatic.</li>\n    <li>Validate reclaim policies, SKU, and mount options during the migration.</li>\n  </ul>\n</div>"
