checks:
  - id: AKSRES001
    name: Cluster Autoscaler
    category: Resource Management
    severity: Medium
    resource_kind: aksCluster
    sources:
      - aks.cluster
    value:
      path: properties.autoScalerProfile
    operator: not_equals
    expected: null
    fail_message: Cluster autoscaler is disabled, requiring manual node scaling that leads to over-provisioning during low demand (wasted costs) or under-provisioning during peak times (performance issues and pod scheduling failures). This significantly increases operational overhead and cloud spending.
    recommendation: Enable Cluster Autoscaler using 'az aks update --resource-group <rg> --name <cluster> --enable-cluster-autoscaler --min-count <min> --max-count <max>' on node pools. Configure appropriate min/max node counts, scale-down parameters, and node pool priorities for optimal cost and performance balance.
    url: https://learn.microsoft.com/azure/aks/cluster-autoscaler

  - id: AKSRES002
    name: AKS Built-in Cost Tooling Enabled
    category: Resource Management
    severity: Medium
    resource_kind: aksCluster
    sources:
      - aks.cluster
    value:
      path: properties.metricsProfile.costAnalysis.enabled
    operator: equals
    expected: true
    fail_message: Cost analysis and OpenCost integration is disabled, providing no visibility into per-namespace, per-workload, or per-application spending. This makes it impossible to implement cost allocation, identify expensive workloads, optimize resource usage, or implement chargeback policies for different teams.
    recommendation: Enable cost analysis using 'az aks update --resource-group <rg> --name <cluster> --enable-cost-analysis' to track namespace and workload-level costs. Use the cost insights to identify expensive workloads, optimize resource requests, and implement chargeback/showback policies.
    url: https://learn.microsoft.com/azure/aks/cost-analysis

  - id: AKSRES003
    name: Vertical Pod Autoscaler (VPA) is enabled
    category: Resource Management
    severity: Medium
    resource_kind: aksCluster
    sources:
      - aks.cluster
    automatic_relevance: alignment
    automatic_scope: cluster
    automatic_reason: aks_autoscaling
    value:
      path: properties.workloadAutoScalerProfile.verticalPodAutoscaler.enabled
    operator: equals
    expected: true
    fail_message: Vertical Pod Autoscaler is disabled, resulting in static resource requests that are often oversized (wasting resources and money) or undersized (causing performance issues and throttling). VPA provides data-driven recommendations to optimize pod resource allocation based on actual usage patterns.
    recommendation: "Enable VPA using 'az aks update --resource-group <rg> --name <cluster> --enable-vpa'. Deploy VPA objects with 'updateMode: Auto' or 'Off' for recommendations only. Monitor VPA recommendations and adjust application resource requests/limits accordingly for better resource efficiency."
    url: https://learn.microsoft.com/azure/aks/vertical-pod-autoscaler

  - id: AKSRES004
    name: KEDA (Event-Driven Autoscaling) Enabled
    category: Resource Management
    severity: Low
    resource_kind: aksCluster
    sources:
      - aks.cluster
    automatic_relevance: alignment
    automatic_scope: cluster
    automatic_reason: aks_autoscaling
    value:
      path: properties.workloadAutoScalerProfile.keda.enabled
    operator: equals
    expected: true
    fail_message: KEDA add-on is disabled, preventing event-driven autoscaling for workloads that process queues, messages, or respond to external metrics. This forces reliance solely on CPU/memory-based HPA scaling, which is suboptimal for event-driven architectures and can lead to over-provisioning or delayed scaling during traffic spikes.
    recommendation: Enable KEDA using 'az aks update --resource-group <rg> --name <cluster> --enable-keda'. Deploy ScaledObject resources to define event sources (Azure Queue, Service Bus, Kafka, HTTP, etc.) and scaling behavior. KEDA complements HPA by enabling scale-to-zero and event-driven scaling patterns.
    url: https://learn.microsoft.com/azure/aks/keda-about

  - id: AKSRES005
    name: Node Auto-provisioning or Cluster Autoscaler Configured
    category: Resource Management
    severity: High
    resource_kind: aksCluster
    sources:
      - aks.cluster
    automatic_relevance: alignment
    automatic_scope: platform
    automatic_reason: aks_autoscaling
    value:
      any:
        - path: properties.nodeProvisioningProfile.mode
          operator: equals
          expected: Auto
        - path: properties.autoScalerProfile
          operator: not_equals
          expected: null
    operator: equals
    expected: true
    fail_message: Neither Node Auto-provisioning (NAP) nor Cluster Autoscaler is enabled, requiring manual node scaling that leads to inefficient resource allocation. NAP uses Karpenter to automatically select optimal VM SKUs based on workload requirements, providing better cost optimization and scaling flexibility than traditional cluster autoscaler.
    recommendation: Enable Node Auto-provisioning using 'az aks update --resource-group <rg> --name <cluster> --node-provisioning-mode Auto' for Karpenter-based dynamic provisioning. Alternatively, enable Cluster Autoscaler with 'az aks update --enable-cluster-autoscaler'. NAP is recommended for modern workloads with diverse resource requirements.
    url: https://learn.microsoft.com/azure/aks/node-auto-provisioning
