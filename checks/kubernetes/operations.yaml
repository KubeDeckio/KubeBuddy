- id: POD010
  name: Naked Pods
  category: Pods
  section: Pods
  resource_kind: Pod
  severity: Warning
  weight: 2
  description: Detects pods that are not owned by a controller such as Deployment, StatefulSet, DaemonSet, Job, or CronJob.
  fail_message: Pod is not managed by a workload controller.
  recommendation: "Run application pods through a controller so rollout, restart, and ownership behavior is explicit. Use Deployment, StatefulSet, DaemonSet, Job, or CronJob depending on workload intent."
  url: https://kubernetes.io/docs/concepts/workloads/controllers/
  native_handler: POD010
  value:
    path: metadata.ownerReferences
  operator: exists
  recommendation_html: "<div class=\"recommendation-content\">\n  <ul>\n    <li>Confirm the pod is not a short-lived diagnostic pod; if it is stale, delete it.</li>\n    <li>For long-running services, recreate the pod as a Deployment, StatefulSet, or DaemonSet so rollout and restart behavior is managed.</li>\n    <li>For one-off or scheduled work, use a Job or CronJob instead of a naked Pod.</li>\n    <li>Move the fix into the source manifest, Helm chart, or GitOps repo so the pod is not recreated unmanaged.</li>\n  </ul>\n</div>"
  speech_bubble:
  - Unmanaged pods can bypass rollout, restart, and ownership expectations.
  - Recreate naked pods as Deployments, Jobs, or another appropriate controller.
- id: JOB003
  name: CronJob Hygiene
  category: Jobs
  section: Jobs
  resource_kind: CronJob
  severity: Warning
  weight: 2
  description: Flags CronJobs with risky defaults such as missing concurrencyPolicy, missing startingDeadlineSeconds, disabled history retention, or suspended schedules.
  fail_message: CronJob has risky scheduling or retention settings.
  recommendation: "Set concurrencyPolicy, startingDeadlineSeconds, and sensible successful/failed history limits. Review suspended CronJobs and remove stale schedules."
  url: https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/
  native_handler: JOB003
  value:
    path: metadata.name
  operator: exists
  recommendation_html: "<div class=\"recommendation-content\">\n  <ul>\n    <li>Set <code>concurrencyPolicy</code> explicitly: use <code>Forbid</code> for non-reentrant jobs, <code>Replace</code> for safe replacement, or document why <code>Allow</code> is acceptable.</li>\n    <li>Add <code>startingDeadlineSeconds</code> so missed schedules do not run unexpectedly long after an outage.</li>\n    <li>Keep useful history with non-zero <code>successfulJobsHistoryLimit</code> and <code>failedJobsHistoryLimit</code> values for troubleshooting.</li>\n    <li>If <code>suspend: true</code>, confirm it is temporary; delete stale CronJobs or annotate the reason and owner.</li>\n  </ul>\n</div>"
  speech_bubble:
  - CronJobs should define concurrency, missed-run, and history behavior explicitly.
  - Review suspended schedules and history limits.
