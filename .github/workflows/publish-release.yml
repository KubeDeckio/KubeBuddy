name: Publish KubeBuddy Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.0.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        run: |
          chmod +x ./scripts/build-release-artifacts.sh
          chmod +x ./scripts/render-homebrew-formula.sh
          ./scripts/build-release-artifacts.sh "${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  check-latest:
    needs: build-and-release
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.release == needs.build-and-release.outputs.tag }}
    steps:
      - id: check
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          excludes: prerelease, draft

  update-formula:
    needs: [build-and-release, check-latest]
    runs-on: ubuntu-latest
    if: needs.check-latest.outputs.is_latest == 'true'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        env:
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          chmod +x ./scripts/build-release-artifacts.sh
          chmod +x ./scripts/render-homebrew-formula.sh
          ./scripts/build-release-artifacts.sh "${TAG}"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: KubeDeckio/homebrew-kubebuddy
          token: ${{ secrets.BREW_BUMP_TOKEN }}
          path: homebrew-kubebuddy

      - name: Update formula
        env:
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          ./scripts/render-homebrew-formula.sh "${TAG}" homebrew-kubebuddy/Formula/kubebuddy.rb

          cat > homebrew-kubebuddy/README.md <<'EOF'
# Homebrew Tap for KubeBuddy

This repository provides the Homebrew tap for the native KubeBuddy CLI.

## Installation

```bash
brew tap KubeDeckio/homebrew-kubebuddy
brew install kubebuddy
```

## Usage

```bash
kubebuddy version
kubebuddy run --html-report --yes --output-path ./reports
```
EOF

          cd homebrew-kubebuddy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/kubebuddy.rb README.md
          git commit -m "Bump KubeBuddy formula to ${TAG}"
          git push
