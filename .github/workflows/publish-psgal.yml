name: Publish Module to PowerShell Gallery

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.0.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Debug Tag
        run: |
          if ($Env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $resolvedTag = '${{ inputs.tag }}'
          }
          else {
            $resolvedTag = $Env:GITHUB_REF_NAME
          }
          Write-Host "RESOLVED_TAG: $resolvedTag"
          Write-Host "GITHUB_REF_NAME: $Env:GITHUB_REF_NAME"
          Write-Host "GITHUB_REF: $Env:GITHUB_REF"
        shell: pwsh

      - name: Set Module Version from Git Tag
        id: set_version
        run: |
          if ($Env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tagVersion = '${{ inputs.tag }}' -replace '^v',''
          }
          elseif (-not $Env:GITHUB_REF_NAME) {
            $tagVersion = $Env:GITHUB_REF -replace '^refs/tags/v',''
          }
          else {
            $tagVersion = $Env:GITHUB_REF_NAME -replace '^v',''
          }

          Write-Host "Setting module version to $tagVersion"

          # Update the PSD1 line: ModuleVersion = '0.0.4'
          (Get-Content ./KubeBuddy.psd1) `
            -replace '^\s*ModuleVersion\s*=\s*''.*''', "ModuleVersion = '$tagVersion'" |
            Set-Content ./KubeBuddy.psd1

          (Get-Content ./Public/kubebuddy.ps1) |
          ForEach-Object {
              $_ -replace '^\s*\$script:KubeBuddyModuleVersion\s*=\s*".*"', "`$script:KubeBuddyModuleVersion = `"v$tagVersion`""
          } |
          Set-Content ./Public/kubebuddy.ps1

          Write-Host "Updated KubeBuddy.psd1 contents:"
          Get-Content ./KubeBuddy.psd1

          Write-Host "Updated kubebuddy.ps1 contents:"
          Get-Content ./Public/kubebuddy.ps1
        shell: pwsh


      - name: Run PSScriptAnalyzer and format output in Markdown
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./ -Recurse -Severity 'Error', 'Warning' -ExcludeRule PSAvoidUsingWriteHost, PSAvoidUsingConvertToSecureStringWithPlainText

          $warnings = $results | Where-Object { $_.Severity -eq 'Warning' }
          $errors = $results | Where-Object { $_.Severity -eq 'Error' }

          Write-Host "Found $($warnings.Count) warnings"
          Write-Host "Found $($errors.Count) errors"

          function ConvertTo-MarkdownTable {
            param ($items)
            $header = "| RuleName | Severity | ScriptName | Line | Message |"
            $separator = "| --- | --- | --- | --- | --- |"
            $rows = foreach ($item in $items) {
              "| $($item.RuleName) | $($item.Severity) | $($item.ScriptName) | $($item.Line) | $($item.Message) |"
            }
            "$header`n$separator`n$($rows -join "`n")"
          }

          if ($warnings.Count -gt 0) {
            $warningTable = ConvertTo-MarkdownTable -items $warnings
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### PSScriptAnalyzer Warnings`n"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "$warningTable`n"
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### No Warnings Found`n"
          }

          if ($errors.Count -gt 0) {
            $errorTable = ConvertTo-MarkdownTable -items $errors
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### PSScriptAnalyzer Errors`n"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "$errorTable`n"
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### No Errors Found`n"
          }

          if ($errors.Count -gt 0) {
            Write-Error "PSScriptAnalyzer found errors."
          }
        shell: pwsh

      - name: Validate PowerShell Module (loads correctly)
        run: |
          $manifest = Test-ModuleManifest -Path ./KubeBuddy.psd1
          Write-Host "Validated Module Version: $($manifest.Version)"
        shell: pwsh

      - name: Build bundled native binaries for module package
        run: |
          New-Item -ItemType Directory -Path ./bin/windows-amd64 -Force | Out-Null
          New-Item -ItemType Directory -Path ./bin/windows-arm64 -Force | Out-Null
          New-Item -ItemType Directory -Path ./bin/darwin-amd64 -Force | Out-Null
          New-Item -ItemType Directory -Path ./bin/darwin-arm64 -Force | Out-Null
          New-Item -ItemType Directory -Path ./bin/linux-amd64 -Force | Out-Null
          New-Item -ItemType Directory -Path ./bin/linux-arm64 -Force | Out-Null

          $version = (Import-PowerShellDataFile ./KubeBuddy.psd1).ModuleVersion
          $ldflags = "-s -w -X github.com/KubeDeckio/KubeBuddy/internal/version.Version=v$version"

          $targets = @(
            @{ GOOS = "windows"; GOARCH = "amd64"; OUT = "./bin/windows-amd64/kubebuddy.exe" },
            @{ GOOS = "windows"; GOARCH = "arm64"; OUT = "./bin/windows-arm64/kubebuddy.exe" },
            @{ GOOS = "darwin"; GOARCH = "amd64"; OUT = "./bin/darwin-amd64/kubebuddy" },
            @{ GOOS = "darwin"; GOARCH = "arm64"; OUT = "./bin/darwin-arm64/kubebuddy" },
            @{ GOOS = "linux"; GOARCH = "amd64"; OUT = "./bin/linux-amd64/kubebuddy" },
            @{ GOOS = "linux"; GOARCH = "arm64"; OUT = "./bin/linux-arm64/kubebuddy" }
          )

          foreach ($target in $targets) {
            Write-Host "Building $($target.GOOS)/$($target.GOARCH) -> $($target.OUT)"
            $env:CGO_ENABLED = "0"
            $env:GOOS = $target.GOOS
            $env:GOARCH = $target.GOARCH
            go build -trimpath -ldflags="$ldflags" -o $target.OUT ./cmd/kubebuddy
            if ($LASTEXITCODE -ne 0) { throw "go build failed for $($target.GOOS)/$($target.GOARCH)" }
          }
        shell: pwsh

      - name: Publish to PowerShell Gallery
        run: |
          Install-Module -Name PowerShellGet -Force -AllowClobber
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Publish-Module -Path ./ -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
