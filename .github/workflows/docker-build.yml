name: Build & Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.0.4
        required: true
        type: string

env:
  IMAGE_NAME: ghcr.io/kubedeckio/kubebuddy
  KUBECTL_VERSION: v1.35.1

jobs:
  docker-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write  # Needed for SBOM submission

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set tag version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF##*/}"
          fi
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Verify Buildx platforms
        run: docker buildx inspect --bootstrap

      - name: Build and push multi-architecture Docker image
        run: |
          docker buildx build \
            -f dockerfile \
            --platform linux/amd64,linux/arm64 \
            --build-arg KUBECTL_VERSION=${{ env.KUBECTL_VERSION }} \
            --tag $IMAGE_NAME:${{ steps.meta.outputs.TAG }} \
            --push \
            .

      - name: Pull image for scanning
        run: |
          docker pull $IMAGE_NAME:${{ steps.meta.outputs.TAG }}

      - name: Show embedded kubectl version
        run: |
          docker run --rm --entrypoint /usr/local/bin/kubectl $IMAGE_NAME:${{ steps.meta.outputs.TAG }} version --client=true --output=yaml

      - name: Scan image for vulnerabilities (block on CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
          TRIVY_DISABLE_VEX_NOTICE: "true"
          TRIVY_SKIP_FILES: "/usr/local/bin/kubectl"
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Generate SBOM (SPDX)
        if: success()
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
        run: |
          trivy image --format spdx-json --output sbom-${{ steps.meta.outputs.TAG }}.json $IMAGE_NAME:${{ steps.meta.outputs.TAG }}

      - name: Upload SBOM as artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ steps.meta.outputs.TAG }}
          path: sbom-${{ steps.meta.outputs.TAG }}.json

      # - name: Submit SBOM to GitHub Dependency Graph
      #   if: success()
      #   uses: advanced-security/spdx-dependency-submission-action@v0.1.1
      #   with:
      #     filePath: sbom-${{ steps.meta.outputs.TAG }}.json

      - name: Tag as 'latest' (optional)
        if: success() && startsWith(steps.meta.outputs.TAG, 'v')
        run: |
          docker buildx imagetools create \
            --tag $IMAGE_NAME:latest \
            $IMAGE_NAME:${{ steps.meta.outputs.TAG }}
