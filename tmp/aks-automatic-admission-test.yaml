  replicas: 1
  selector:
    matchLabels:
      app: test-host-path
  template:
    metadata:
      labels:
        app: test-host-path
    spec:
      containers:
        - name: app
          image: nginx:1.25.5
          volumeMounts:
            - name: host-data
              mountPath: /host-data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
      volumes:
        - name: host-data
          hostPath:
            path: /tmp
            type: Directory
