- id: WRK011
  name: VPA Update Mode and Declarative Resource Conflict Risk
  category: Workloads
  section: Workloads
  resource_kind: verticalpodautoscalers.autoscaling.k8s.io
  severity: Warning
  weight: 2
  description: Flags VPAs in Auto/Recreate mode that may conflict with declarative resource ownership or HPAs.
  fail_message: VPA mode may conflict with declarative resources or HPA scaling.
  recommendation: "Use VPA Off/Initial for recommendation-only flows, or tune ownership boundaries when combining VPA with HPA/GitOps."
  url: https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler
  native_handler: WRK011
  value:
    path: metadata.name
  operator: exists
  recommendation_html: "<div class=\"recommendation-content\">\n  <ul>\n    <li>If GitOps/Helm controls requests, consider VPA <code>updateMode: Off</code> or <code>Initial</code>.</li>\n    <li>Avoid overlapping HPA (CPU/memory) and VPA ownership without clear boundaries.</li>\n    <li>Document which controller owns requests per workload.</li>\n  </ul>\n</div>"
  speech_bubble:
  - "\U0001F916 Some VPA configurations may fight with declarative config or HPA."
  - "\u26A0\uFE0F Clarify autoscaling ownership boundaries."
