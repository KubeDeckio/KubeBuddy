  - Prefer Kubernetes Services and ClusterFirst DNS.
- id: WRK021
  name: Missing Workload PriorityClass
  category: Scheduling
  section: Workloads
  resource_kind: Deployment, StatefulSet, DaemonSet
  severity: Low
  check_type: advisory
  weight: 1
  description: Flags long-running workload controllers without priorityClassName, making eviction and scheduling priority implicit.
  fail_message: Workload does not set priorityClassName.
