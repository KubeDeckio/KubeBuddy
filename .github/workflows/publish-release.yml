name: Publish KubeBuddy Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.0.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        run: |
          chmod +x ./scripts/build-release-artifacts.sh
          ./scripts/build-release-artifacts.sh "${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  check-latest:
    needs: build-and-release
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.release == needs.build-and-release.outputs.tag }}
    steps:
      - id: check
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          excludes: prerelease, draft

  hash:
    needs: [build-and-release, check-latest]
    runs-on: ubuntu-latest
    if: needs.check-latest.outputs.is_latest == 'true'
    outputs:
      build_hash: ${{ steps.calc.outputs.build_hash }}
    steps:
      - name: Download linux amd64 tarball
        run: |
          TAG=${{ needs.build-and-release.outputs.tag }}
          VERSION=${TAG#v}
          curl -L -o kubebuddy_linux_amd64.tar.gz \
            https://github.com/${{ github.repository }}/releases/download/${TAG}/kubebuddy_${VERSION}_linux_amd64.tar.gz

      - name: Calculate SHA256
        id: calc
        run: echo "build_hash=$(sha256sum kubebuddy_linux_amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  update-formula:
    needs: [build-and-release, check-latest, hash]
    runs-on: ubuntu-latest
    if: needs.check-latest.outputs.is_latest == 'true'
    steps:
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: KubeDeckio/homebrew-kubebuddy
          token: ${{ secrets.BREW_BUMP_TOKEN }}
          path: homebrew-kubebuddy

      - name: Update formula
        working-directory: homebrew-kubebuddy
        run: |
          TAG=${{ needs.build-and-release.outputs.tag }}
          VERSION=${TAG#v}
          SHA=${{ needs.hash.outputs.build_hash }}
          FORMULA=Formula/kubebuddy.rb

          sed -i "s|url \".*\"|url \"https://github.com/${{ github.repository }}/releases/download/${TAG}/kubebuddy_${VERSION}_linux_amd64.tar.gz\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"$SHA\"|" "$FORMULA"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -am "Bump KubeBuddy formula to ${TAG}"
          git push
