  - ID: "SEC015"
    Name: "Host Ports in Pod Specs"
    Category: "Pod Security"
    Section: "Security"
    ResourceKind: "Pod"
    Severity: "critical"
    Weight: 4
    AutomaticRelevance: "blocker"
    AutomaticScope: "workload"
    AutomaticReason: "host_ports"
    AutomaticAdmissionBehavior: "denies_on_enforce"
    AutomaticMutationOutcome: "Observed on AKS Automatic: workloads using hostPort can be denied by baseline admission policy."
    Description: >
      Detects containers that bind host ports directly on the node.
      This reduces isolation and is disallowed by baseline Pod Security Standards.
    FailMessage: "Container uses a hostPort"
    Recommendation:
      text: "Remove hostPort bindings and expose workloads using Services, Ingress, or Gateway APIs instead."
      html: |
        <ul>
          <li>Remove <code>hostPort</code> from container port definitions.</li>
          <li>Use a Service or Ingress for north-south access.</li>
          <li>Reserve host networking only for platform workloads that truly require it.</li>
        </ul>
    URL: "https://kubernetes.io/docs/concepts/security/pod-security-standards/#baseline"
    Script: |
      param([object]$KubeData, $Namespace, [switch]$ExcludeNamespaces)
      $pods = $KubeData?.Pods?.items ?? (kubectl get pods -A -o json | ConvertFrom-Json).items
      if ($ExcludeNamespaces) { $pods = Exclude-Namespaces -items $pods }
      if ($Namespace) { $pods = $pods | Where-Object { $_.metadata.namespace -eq $Namespace } }

      $results = @()
      foreach ($pod in $pods) {
        $containers = @()
        $containers += $pod.spec.containers
        $containers += $pod.spec.initContainers
        $containers += $pod.spec.ephemeralContainers

        foreach ($container in ($containers | Where-Object { $_ })) {
          foreach ($port in ($container.ports ?? @())) {
            if ($null -ne $port.hostPort -and [int]$port.hostPort -gt 0) {
              $results += [pscustomobject]@{
                Namespace = $pod.metadata.namespace
                Pod       = $pod.metadata.name
                Container = $container.name
                HostPort  = [int]$port.hostPort
                Issue     = "hostPort is configured"
              }
            }
          }
        }
      }

      return @{
        Items = $results
        IssueCount = $results.Count
      }
  - ID: "SEC016"
    Name: "Unconfined Seccomp Profiles"
