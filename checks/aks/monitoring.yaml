checks:
  - id: AKSMON001
    name: Azure Monitor
    category: Monitoring & Logging
    severity: High
    resource_kind: aksCluster
    sources:
      - aks.cluster
    value:
      path: properties.addonProfiles.omsagent.enabled
    operator: equals
    expected: true
    fail_message: Azure Monitor Container Insights is disabled, providing no visibility into container performance, resource utilization, pod failures, or cluster health. This eliminates troubleshooting capabilities, prevents proactive monitoring, and makes root cause analysis nearly impossible during incidents.
    recommendation: Enable Azure Monitor Container Insights using 'az aks enable-addons --resource-group <rg> --name <cluster> --addons monitoring --workspace-resource-id <workspace-id>' or through Azure Portal > Monitoring > Insights. Configure log retention (90+ days) and set up alerts for container failures and resource usage.
    url: https://learn.microsoft.com/azure/azure-monitor/containers/container-insights-overview

  - id: AKSMON002
    name: Managed Prometheus Enabled
    category: Monitoring & Logging
    severity: High
    resource_kind: aksCluster
    sources:
      - aks.cluster
    value:
      path: properties.azureMonitorProfile.metrics.enabled
    operator: equals
    expected: true
    fail_message: Azure Monitor managed Prometheus is disabled, missing critical Kubernetes-native metrics for workload performance, resource utilization trends, and application-specific monitoring. This limits observability to basic infrastructure metrics and prevents comprehensive performance analysis and capacity planning.
    recommendation: Enable managed Prometheus using 'az aks update --resource-group <rg> --name <cluster> --enable-azure-monitor-metrics' or via Azure Portal > Monitoring > Insights. Consider integrating with Azure Managed Grafana for advanced dashboards and setting up alerting rules for critical metrics.
    url: https://learn.microsoft.com/azure/azure-monitor/essentials/prometheus-metrics-overview
